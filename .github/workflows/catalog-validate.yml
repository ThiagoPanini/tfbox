name: "🔁 Reusable Catalog Validate"

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: "20"

permissions:
  contents: read

jobs:
  catalog:
    name: 🧩 catalog validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # maintainers + module version rely on full git history

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: |
            scripts/package-lock.json
            web/package-lock.json

      - name: Install catalog-builder deps
        working-directory: scripts
        run: npm ci

      - name: Build catalog.json
        working-directory: scripts
        run: npm run build

      - name: Parser unit tests
        working-directory: scripts
        run: npm test

      - name: Copy catalog to web/public
        run: |
          mkdir -p web/public
          cp catalog.json web/public/catalog.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Next.js static export
        working-directory: web
        env:
          NEXT_PUBLIC_BASE_PATH: /tfbox
        run: npm run build
