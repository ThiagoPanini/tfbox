name: catalog + deploy

on:
  pull_request:
    types: [opened, reopened, synchronize, closed] # Closed required
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # maintainers + module version rely on full git history

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            scripts/package-lock.json
            web/package-lock.json

      - name: Install catalog-builder deps
        working-directory: scripts
        run: npm ci

      - name: Build catalog.json
        working-directory: scripts
        run: |
          mkdir -p ../web/public
          npm run build:web

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Parser unit tests
        working-directory: scripts
        run: npm test

      - name: Next.js static export
        working-directory: web
        env:
          NEXT_PUBLIC_BASE_PATH: /tfbox
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
