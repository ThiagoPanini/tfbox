name: "Feature Branch CI"

on:
  push:
    branches:
      - feature**
      - '[0-9].[0-9].x'
      - 'v[0-9].[0-9].[0-9]'
      - 'v[0-9].[0-9].x'
      - docs**

permissions:
  contents: read

concurrency:
  group: ci-feature-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-terraform:
    name: Terraform validation
    uses: ./.github/workflows/tf-validate.yml
    with:
      modules: '["dynamodb-table","iam-role","lambda-layer","sqs-queue","sns-topic","lambda-function"]'

  validate-catalog:
    name: Catalog validation
    uses: ./.github/workflows/catalog-validate.yml

  open-pr-to-main:
    name: Open pull request to main
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - validate-terraform
      - validate-catalog
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Open pull request to main
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          base: main
          branch: ${{ github.ref_name }}
          title: "pr(main): ${{ github.ref_name }} -> main"
          body-path: ".github/pull_request_template.md"
          labels: "github-bot"
          commit-message: "bot: automatic PR opening to main branch"
